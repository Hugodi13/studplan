# Lancer : GitHub → Actions → « Cloudflare Pages » → Run workflow
# Secret requis : CLOUDFLARE_API_TOKEN (compte → API Tokens, permission Edit Cloudflare Pages)
# Optionnel : VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (même noms qu’en prod pour un build fiable)
name: Cloudflare Pages

on: workflow_dispatch

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || '' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
      - name: wrangler pages deploy
        run: npx wrangler@4 pages deploy dist --project-name=studplan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
