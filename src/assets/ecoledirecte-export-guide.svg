<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="520" rx="24" fill="#ECFEFF"/>
  <rect x="42" y="42" width="816" height="436" rx="18" fill="white" stroke="#A5F3FC" stroke-width="2"/>
  <text x="72" y="96" fill="#155E75" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Ecole Directe - Export PDF homework</text>
  <rect x="72" y="126" width="340" height="120" rx="14" fill="#ECFEFF"/>
  <text x="92" y="166" fill="#0E7490" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">1) Open Ecole Directe</text>
  <text x="92" y="198" fill="#0891B2" font-family="Inter, Arial, sans-serif" font-size="18">Go to Homework tab</text>
  <text x="92" y="224" fill="#0891B2" font-family="Inter, Arial, sans-serif" font-size="18">and choose the period.</text>
  <rect x="488" y="126" width="340" height="120" rx="14" fill="#ECFEFF"/>
  <text x="508" y="166" fill="#0E7490" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">2) Print or Export PDF</text>
  <text x="508" y="198" fill="#0891B2" font-family="Inter, Arial, sans-serif" font-size="18">Download the PDF file</text>
  <text x="508" y="224" fill="#0891B2" font-family="Inter, Arial, sans-serif" font-size="18">to your phone or computer.</text>
  <rect x="280" y="286" width="340" height="140" rx="14" fill="#CFFAFE"/>
  <text x="300" y="326" fill="#155E75" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">3) Drop PDF in StudPlan</text>
  <text x="300" y="358" fill="#0E7490" font-family="Inter, Arial, sans-serif" font-size="18">StudPlan reads the document</text>
  <text x="300" y="384" fill="#0E7490" font-family="Inter, Arial, sans-serif" font-size="18">and adds tasks to your list.</text>
  <path d="M428 185H468" stroke="#0891B2" stroke-width="8" stroke-linecap="round"/>
  <path d="M458 171L476 185L458 199" stroke="#0891B2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M620 256L560 286" stroke="#0891B2" stroke-width="8" stroke-linecap="round"/>
  <path d="M558 268L546 292L572 292" fill="#0891B2"/>
</svg>
